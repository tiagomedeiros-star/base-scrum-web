<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SprintMaster Pro - Gestão Ágil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .tab-content { display: none; opacity: 0; transform: translateY(10px); transition: all 0.3s ease; }
        .tab-content.active { display: block; opacity: 1; transform: translateY(0); }
        .nav-button.active { background-color: #2563eb; color: white; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.3); }
        .modal { transition: opacity 0.25s ease; }
        .kanban-column.drag-over { background-color: rgba(59, 130, 246, 0.1); border: 2px dashed #3b82f6; }
        .dragging { opacity: 0.5; transform: scale(0.95); }
        .badge-p1 { background-color: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .badge-p2 { background-color: #ffedd5; color: #ea580c; border: 1px solid #fed7aa; }
        .badge-p3 { background-color: #dbeafe; color: #2563eb; border: 1px solid #bfdbfe; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen overflow-hidden">

    <div class="flex h-full">
        <aside class="w-72 bg-white border-r border-slate-200 flex flex-col shrink-0 shadow-sm z-30">
            <div class="p-6 border-b border-slate-100">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fas fa-bolt"></i></div>
                    <div>
                        <h1 class="font-black text-lg text-blue-900">SprintMaster</h1>
                        <p class="text-[9px] text-blue-500 font-extrabold uppercase">Agile Suite</p>
                    </div>
                </div>
            </div>

            <div class="p-4 bg-slate-50 border-b border-slate-100">
                <label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Projeto Ativo</label>
                <div class="relative">
                    <select id="project-selector" class="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm font-semibold outline-none appearance-none"></select>
                    <i class="fas fa-chevron-down absolute right-3 top-3 text-slate-400 text-xs pointer-events-none"></i>
                </div>
                <button onclick="openModal('modal-new-project')" class="mt-3 w-full border-2 border-dashed border-slate-300 rounded-lg py-2 text-xs font-bold text-slate-500 hover:text-blue-600 hover:border-blue-400 transition-all">+ Novo Projeto</button>
            </div>

            <nav class="flex-1 p-4 space-y-2">
                <button onclick="switchView('backlog')" class="nav-button w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 active" data-view="backlog">
                    <i class="fas fa-list-ul w-5"></i> <span class="text-sm font-semibold">Backlog & Histórias</span>
                </button>
                <button onclick="switchView('sprint')" class="nav-button w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600" data-view="sprint">
                    <i class="fas fa-columns w-5"></i> <span class="text-sm font-semibold">Sprint Board</span>
                </button>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 bg-white border-b border-slate-200 px-8 flex items-center justify-between shrink-0">
                <div class="flex items-center gap-4">
                    <h2 class="text-xl font-extrabold text-slate-800" id="current-project-title">Carregando...</h2>
                    <span class="px-2 py-1 bg-green-100 text-green-700 rounded text-[10px] font-bold uppercase">Sprint Ativa</span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="text-right">
                        <p class="text-xs font-bold text-slate-600">Velocity</p>
                        <p class="text-xs text-slate-400"><span id="total-points">0</span> pts planejados</p>
                    </div>
                </div>
            </header>

            <section class="flex-1 p-8 overflow-y-auto bg-slate-50">
                <div id="view-backlog" class="tab-content active space-y-6">
                    <div class="flex justify-between items-center">
                        <h3 class="text-2xl font-black text-slate-800">Histórias de Usuário</h3>
                        <button onclick="openModal('modal-new-story')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-lg transition-all">
                            <i class="fas fa-plus mr-2"></i> Nova História
                        </button>
                    </div>
                    <div id="backlog-container" class="space-y-6"></div>
                </div>

                <div id="view-sprint" class="tab-content h-full">
                    <div class="flex gap-6 h-full overflow-x-auto pb-4">
                        <div class="min-w-[320px] flex-1 flex flex-col">
                            <div class="flex justify-between items-center mb-4 px-2">
                                <span class="text-xs font-black text-slate-400 uppercase tracking-widest">A Fazer</span>
                                <span class="bg-slate-200 text-slate-600 text-[10px] px-2 py-0.5 rounded-full font-bold" id="count-todo">0</span>
                            </div>
                            <div id="col-todo" data-status="todo" class="kanban-column flex-1 bg-slate-200/50 rounded-2xl p-3 space-y-3 min-h-[200px] border-2 border-transparent transition-colors"></div>
                        </div>
                        <div class="min-w-[320px] flex-1 flex flex-col">
                            <div class="flex justify-between items-center mb-4 px-2">
                                <span class="text-xs font-black text-slate-400 uppercase tracking-widest">Em Andamento</span>
                                <span class="bg-blue-100 text-blue-600 text-[10px] px-2 py-0.5 rounded-full font-bold" id="count-doing">0</span>
                            </div>
                            <div id="col-doing" data-status="doing" class="kanban-column flex-1 bg-blue-50 rounded-2xl p-3 space-y-3 min-h-[200px] border-2 border-transparent transition-colors"></div>
                        </div>
                        <div class="min-w-[320px] flex-1 flex flex-col">
                            <div class="flex justify-between items-center mb-4 px-2">
                                <span class="text-xs font-black text-slate-400 uppercase tracking-widest">Concluído</span>
                                <span class="bg-green-100 text-green-600 text-[10px] px-2 py-0.5 rounded-full font-bold" id="count-done">0</span>
                            </div>
                            <div id="col-done" data-status="done" class="kanban-column flex-1 bg-green-50 rounded-2xl p-3 space-y-3 min-h-[200px] border-2 border-transparent transition-colors"></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-new-story" class="modal opacity-0 pointer-events-none fixed inset-0 flex items-center justify-center z-50 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg p-8 rounded-3xl shadow-2xl">
            <h4 class="text-2xl font-black mb-6 text-slate-800">Criar História de Usuário</h4>
            <div class="space-y-4">
                <input type="text" id="story-title" class="w-full bg-slate-100 p-3 rounded-xl outline-none" placeholder="Título da História">
                <select id="story-priority" class="w-full bg-slate-100 p-3 rounded-xl outline-none">
                    <option value="P1">P1 - Alta</option>
                    <option value="P2" selected>P2 - Média</option>
                    <option value="P3">P3 - Baixa</option>
                </select>
                <textarea id="story-desc" rows="3" class="w-full bg-slate-100 p-3 rounded-xl outline-none" placeholder="Descrição da História"></textarea>
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeModal('modal-new-story')" class="font-bold text-slate-400">Cancelar</button>
                <button id="btn-create-story" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">Criar História</button>
            </div>
        </div>
    </div>

    <div id="modal-add-task" class="modal opacity-0 pointer-events-none fixed inset-0 flex items-center justify-center z-50 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg p-8 rounded-3xl shadow-2xl">
            <h4 class="text-xl font-black mb-2 text-slate-800" id="task-modal-title">Adicionar Tarefa</h4>
            <input type="hidden" id="target-story-id">
            <input type="hidden" id="editing-task-id">
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Nome da Tarefa</label>
                    <input type="text" id="task-title" class="w-full bg-slate-100 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ex: Criar API de login">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Descrição</label>
                    <textarea id="task-desc" rows="2" class="w-full bg-slate-100 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="Detalhes da tarefa..."></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Pontos</label>
                        <input type="number" id="task-points" class="w-full bg-slate-100 p-3 rounded-xl outline-none" value="3">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Responsável</label>
                        <input type="text" id="task-owner" class="w-full bg-slate-100 p-3 rounded-xl outline-none" placeholder="Nome">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Data Início</label>
                        <input type="date" id="task-start" class="w-full bg-slate-100 p-3 rounded-xl outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Data Término</label>
                        <input type="date" id="task-end" class="w-full bg-slate-100 p-3 rounded-xl outline-none">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Status</label>
                    <select id="task-status" class="w-full bg-slate-100 p-3 rounded-xl outline-none">
                        <option value="todo">A Fazer</option>
                        <option value="doing">Em Andamento</option>
                        <option value="done">Concluído</option>
                    </select>
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeModal('modal-add-task')" class="font-bold text-slate-400">Cancelar</button>
                <button id="btn-confirm-task" class="bg-green-600 text-white px-6 py-2 rounded-xl font-bold shadow-lg shadow-green-200">Salvar Tarefa</button>
            </div>
        </div>
    </div>

    <div id="modal-new-project" class="modal opacity-0 pointer-events-none fixed inset-0 flex items-center justify-center z-50 bg-slate-900/60">
        <div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-2xl">
            <h4 class="text-2xl font-black mb-6">Novo Projeto</h4>
            <input type="text" id="new-project-name" class="w-full bg-slate-100 p-4 rounded-xl outline-none" placeholder="Nome do Projeto">
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeModal('modal-new-project')" class="font-bold text-slate-500">Cancelar</button>
                <button id="btn-save-project" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">Criar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, updateDoc, deleteDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGQZgIkr2T7DJ880Z0R6Nqi_R4O5zabTw",
            authDomain: "base-scrum.firebaseapp.com",
            projectId: "base-scrum",
            storageBucket: "base-scrum.firebasestorage.app",
            messagingSenderId: "862384072053",
            appId: "1:862384072053:web:922d943b7b95b065381f3c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let activeProjectId = null;
        let storiesData = [];

        // UI UTILS
        window.openModal = (id) => document.getElementById(id).classList.remove('opacity-0', 'pointer-events-none');
        window.closeModal = (id) => {
            document.getElementById(id).classList.add('opacity-0', 'pointer-events-none');
            // Limpar campos de tarefa ao fechar
            if(id === 'modal-add-task') {
                document.getElementById('editing-task-id').value = '';
                document.getElementById('task-title').value = '';
                document.getElementById('task-desc').value = '';
            }
        };
        
        window.switchView = (v) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-button').forEach(b => b.classList.remove('active'));
            document.getElementById('view-'+v).classList.add('active');
            document.querySelector(`[data-view="${v}"]`).classList.add('active');
        };

        // CARREGAR PROJETOS
        onSnapshot(collection(db, "projects"), (snap) => {
            const projects = snap.docs.map(d => ({id: d.id, ...d.data()}));
            const sel = document.getElementById('project-selector');
            sel.innerHTML = projects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
            if(!activeProjectId && projects.length) { activeProjectId = projects[0].id; loadStories(); }
            sel.onchange = (e) => { activeProjectId = e.target.value; loadStories(); };
        });

        document.getElementById('btn-save-project').onclick = async () => {
            const name = document.getElementById('new-project-name').value;
            if(name) await addDoc(collection(db, "projects"), { name, createdAt: new Date() });
            closeModal('modal-new-project');
        };

        // CARREGAR HISTÓRIAS E TAREFAS
        function loadStories() {
            if(!activeProjectId) return;
            const q = query(collection(db, "backlog"), where("projectId", "==", activeProjectId));
            onSnapshot(q, (snap) => {
                storiesData = snap.docs.map(d => ({id: d.id, ...d.data()}));
                const sel = document.getElementById('project-selector');
                const projName = sel.options[sel.selectedIndex]?.text;
                document.getElementById('current-project-title').innerText = projName || "Projeto";
                renderBacklog();
                renderKanban();
                calculateVelocity();
            });
        }

        function calculateVelocity() {
            let total = 0;
            storiesData.forEach(s => (s.tasks || []).forEach(t => total += (parseInt(t.points) || 0)));
            document.getElementById('total-points').innerText = total;
        }

        // CRIAR HISTÓRIA
        document.getElementById('btn-create-story').onclick = async () => {
            const title = document.getElementById('story-title').value;
            const priority = document.getElementById('story-priority').value;
            const desc = document.getElementById('story-desc').value;
            if(title && activeProjectId) {
                await addDoc(collection(db, "backlog"), { projectId: activeProjectId, title, priority, description: desc, tasks: [] });
                closeModal('modal-new-story');
            }
        };

        // AÇÕES DE TAREFAS (EDITAR/ADICIONAR/EXCLUIR)
        window.openAddTaskModal = (storyId, storyTitle) => {
            document.getElementById('task-modal-title').innerText = "Nova Tarefa";
            document.getElementById('target-story-id').value = storyId;
            document.getElementById('editing-task-id').value = '';
            openModal('modal-add-task');
        };

        window.editTask = (storyId, taskId) => {
            const story = storiesData.find(s => s.id === storyId);
            const task = story.tasks.find(t => t.id === taskId);
            
            document.getElementById('task-modal-title').innerText = "Editar Tarefa";
            document.getElementById('target-story-id').value = storyId;
            document.getElementById('editing-task-id').value = taskId;
            
            document.getElementById('task-title').value = task.title;
            document.getElementById('task-desc').value = task.description || '';
            document.getElementById('task-points').value = task.points;
            document.getElementById('task-owner').value = task.owner;
            document.getElementById('task-start').value = task.startDate || '';
            document.getElementById('task-end').value = task.endDate || '';
            document.getElementById('task-status').value = task.status;
            
            openModal('modal-add-task');
        };

        document.getElementById('btn-confirm-task').onclick = async () => {
            const storyId = document.getElementById('target-story-id').value;
            const editingTaskId = document.getElementById('editing-task-id').value;
            
            const taskData = {
                title: document.getElementById('task-title').value,
                description: document.getElementById('task-desc').value,
                points: parseInt(document.getElementById('task-points').value) || 0,
                owner: document.getElementById('task-owner').value || 'Sem dono',
                startDate: document.getElementById('task-start').value,
                endDate: document.getElementById('task-end').value,
                status: document.getElementById('task-status').value
            };

            if(storyId && taskData.title) {
                const storyRef = doc(db, "backlog", storyId);
                const story = storiesData.find(s => s.id === storyId);
                let updatedTasks = [...(story.tasks || [])];

                if(editingTaskId) {
                    const idx = updatedTasks.findIndex(t => t.id === editingTaskId);
                    updatedTasks[idx] = { ...updatedTasks[idx], ...taskData };
                } else {
                    updatedTasks.push({ id: Date.now().toString(), ...taskData });
                }

                await updateDoc(storyRef, { tasks: updatedTasks });
                closeModal('modal-add-task');
            }
        };

        window.deleteTask = async (storyId, taskId) => {
            if(confirm("Deseja excluir esta tarefa?")) {
                const storyRef = doc(db, "backlog", storyId);
                const story = storiesData.find(s => s.id === storyId);
                const updatedTasks = story.tasks.filter(t => t.id !== taskId);
                await updateDoc(storyRef, { tasks: updatedTasks });
            }
        };

        window.deleteStory = async (id) => {
            if(confirm("Apagar esta História e todas as suas tarefas?")) await deleteDoc(doc(db, "backlog", id));
        };

        // RENDERIZAÇÃO
        function renderBacklog() {
            const container = document.getElementById('backlog-container');
            container.innerHTML = storiesData.map(story => {
                const pColor = story.priority === 'P1' ? 'badge-p1' : (story.priority === 'P2' ? 'badge-p2' : 'badge-p3');
                const storyPoints = (story.tasks || []).reduce((acc, t) => acc + (t.points || 0), 0);

                return `
                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                    <div class="p-6 border-b border-slate-100 flex justify-between items-start bg-slate-50/50">
                        <div class="flex gap-4">
                            <div class="flex flex-col items-center">
                                <span class="text-[10px] font-black uppercase px-2 py-0.5 rounded ${pColor}">${story.priority}</span>
                                <span class="text-[10px] font-bold text-slate-400 mt-1">${storyPoints} pts</span>
                            </div>
                            <div>
                                <h4 class="text-lg font-bold text-slate-800 leading-tight">${story.title}</h4>
                                <p class="text-xs text-slate-500">${story.description || 'Sem descrição'}</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="openAddTaskModal('${story.id}', '${story.title}')" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm hover:bg-blue-700 transition-all">
                                <i class="fas fa-plus mr-1"></i> Add Task
                            </button>
                            <button onclick="deleteStory('${story.id}')" class="text-slate-300 hover:text-red-500 px-2 transition-colors"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <div class="p-4 bg-white space-y-2">
                        ${(story.tasks && story.tasks.length > 0) ? story.tasks.map(t => `
                            <div class="flex items-center justify-between p-3 rounded-xl border border-slate-100 bg-slate-50 group">
                                <div class="flex items-center gap-3">
                                    <div class="w-2 h-2 rounded-full ${t.status === 'done' ? 'bg-green-500' : (t.status === 'doing' ? 'bg-blue-500' : 'bg-slate-300')}"></div>
                                    <div>
                                        <p class="text-sm font-semibold text-slate-700">${t.title}</p>
                                        <p class="text-[10px] text-slate-400">${t.startDate || 'S/D'} até ${t.endDate || 'S/D'}</p>
                                    </div>
                                </div>
                                <div class="flex items-center gap-4">
                                    <span class="text-[10px] font-bold text-slate-400 uppercase">${t.owner}</span>
                                    <div class="flex gap-2">
                                        <button onclick="editTask('${story.id}', '${t.id}')" class="text-slate-400 hover:text-blue-600"><i class="fas fa-edit"></i></button>
                                        <button onclick="deleteTask('${story.id}', '${t.id}')" class="text-slate-400 hover:text-red-500"><i class="fas fa-trash"></i></button>
                                    </div>
                                </div>
                            </div>
                        `).join('') : '<p class="text-center text-xs text-slate-300 italic">Nenhuma tarefa.</p>'}
                    </div>
                </div>`;
            }).join('');
        }

        function renderKanban() {
            const cols = { todo: document.getElementById('col-todo'), doing: document.getElementById('col-doing'), done: document.getElementById('col-done') };
            Object.values(cols).forEach(c => c.innerHTML = '');
            let counts = { todo: 0, doing: 0, done: 0 };

            storiesData.forEach(story => {
                (story.tasks || []).forEach((task) => {
                    if(cols[task.status]) {
                        counts[task.status]++;
                        const card = document.createElement('div');
                        card.className = "bg-white p-4 rounded-xl shadow-sm border border-slate-200 hover:shadow-md cursor-pointer relative group";
                        card.onclick = () => editTask(story.id, task.id);
                        
                        card.innerHTML = `
                            <div class="flex justify-between items-start mb-2">
                                <span class="bg-slate-100 text-slate-500 text-[9px] font-bold px-1.5 py-0.5 rounded">${task.points} pts</span>
                                <span class="text-[9px] font-bold text-slate-400 uppercase">${task.status}</span>
                            </div>
                            <h5 class="text-sm font-bold text-slate-800 mb-1">${task.title}</h5>
                            <p class="text-[10px] text-slate-500 mb-3 line-clamp-2">${task.description || 'Sem descrição'}</p>
                            <div class="pt-2 border-t border-slate-50 flex flex-col gap-1">
                                <div class="flex justify-between items-center">
                                    <span class="text-[9px] font-bold text-blue-600"><i class="far fa-calendar-alt mr-1"></i>${task.startDate || '-'} / ${task.endDate || '-'}</span>
                                    <span class="text-[9px] font-black text-slate-400 uppercase">${task.owner}</span>
                                </div>
                            </div>`;
                        cols[task.status].appendChild(card);
                    }
                });
            });
            document.getElementById('count-todo').innerText = counts.todo;
            document.getElementById('count-doing').innerText = counts.doing;
            document.getElementById('count-done').innerText = counts.done;
        }
    </script>
</body>
</html>
