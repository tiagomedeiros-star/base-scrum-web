<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectPro Sprint - Gestão Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .tab-content { display: none; opacity: 0; transform: translateY(10px); transition: all 0.3s ease; }
        .tab-content.active { display: block; opacity: 1; transform: translateY(0); }
        .nav-button.active { background-color: #2563eb; color: white; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.3); }
        .kanban-column.drag-over { background-color: rgba(59, 130, 246, 0.1); border: 2px dashed #3b82f6; }
        .dragging { opacity: 0.5; transform: scale(0.95); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen overflow-hidden">

    <div class="flex h-full">
        <aside class="w-72 bg-white border-r border-slate-200 flex flex-col shrink-0 shadow-sm z-30">
            <div class="p-6 border-b border-slate-100">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fas fa-bolt"></i></div>
                    <div>
                        <h1 class="font-black text-lg text-blue-900">SprintMaster</h1>
                        <p class="text-[9px] text-blue-500 font-extrabold uppercase">Agile Suite</p>
                    </div>
                </div>
            </div>

            <div class="p-4 bg-slate-50 border-b border-slate-100">
                <label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Projeto Ativo</label>
                <div class="relative">
                    <select id="project-selector" class="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm font-semibold outline-none appearance-none"></select>
                    <i class="fas fa-chevron-down absolute right-3 top-3 text-slate-400 text-xs pointer-events-none"></i>
                </div>
                <button onclick="openModal('modal-new-project')" class="mt-3 w-full border-2 border-dashed border-slate-300 rounded-lg py-2 text-xs font-bold text-slate-500 hover:text-blue-600 hover:border-blue-400 transition-all">+ Novo Projeto</button>
            </div>

            <nav class="flex-1 p-4 space-y-2">
                <button onclick="switchView('backlog')" class="nav-button w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 active" data-view="backlog">
                    <i class="fas fa-list-ul w-5"></i> <span class="text-sm font-semibold">Backlog & Histórias</span>
                </button>
                <button onclick="switchView('sprint')" class="nav-button w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600" data-view="sprint">
                    <i class="fas fa-columns w-5"></i> <span class="text-sm font-semibold">Sprint Board</span>
                </button>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 bg-white border-b border-slate-200 px-8 flex items-center justify-between shrink-0">
                <div class="flex items-center gap-4">
                    <h2 class="text-xl font-extrabold text-slate-800" id="current-project-title">Carregando...</h2>
                </div>
            </header>

            <section class="flex-1 p-8 overflow-y-auto bg-slate-50">
                <div id="view-backlog" class="tab-content active space-y-6">
                    <div class="flex justify-between items-center">
                        <h3 class="text-2xl font-black text-slate-800">Histórias de Usuário</h3>
                        <button onclick="prepareStoryModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-lg">
                            <i class="fas fa-plus mr-2"></i> Nova História
                        </button>
                    </div>
                    <div id="backlog-container" class="space-y-6"></div>
                </div>

                <div id="view-sprint" class="tab-content h-full">
                    <div class="flex gap-6 h-full overflow-x-auto pb-4">
                        <div class="min-w-[320px] flex-1 flex flex-col">
                            <div class="mb-4 px-2 uppercase text-[10px] font-black text-slate-400">A Fazer</div>
                            <div id="col-todo" data-status="todo" class="kanban-column flex-1 bg-slate-200/50 rounded-2xl p-3 space-y-3 min-h-[400px]"></div>
                        </div>
                        <div class="min-w-[320px] flex-1 flex flex-col">
                            <div class="mb-4 px-2 uppercase text-[10px] font-black text-slate-400">Em Andamento</div>
                            <div id="col-doing" data-status="doing" class="kanban-column flex-1 bg-blue-50 rounded-2xl p-3 space-y-3 min-h-[400px]"></div>
                        </div>
                        <div class="min-w-[320px] flex-1 flex flex-col">
                            <div class="mb-4 px-2 uppercase text-[10px] font-black text-slate-400">Concluído</div>
                            <div id="col-done" data-status="done" class="kanban-column flex-1 bg-green-50 rounded-2xl p-3 space-y-3 min-h-[400px]"></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-story" class="modal opacity-0 pointer-events-none fixed inset-0 flex items-center justify-center z-50 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg p-8 rounded-3xl shadow-2xl">
            <h4 id="story-modal-title" class="text-2xl font-black mb-6">Nova História</h4>
            <input type="hidden" id="edit-story-id">
            <div class="space-y-4">
                <input type="text" id="story-title" class="w-full bg-slate-100 p-3 rounded-xl outline-none" placeholder="Título">
                <textarea id="story-desc" rows="3" class="w-full bg-slate-100 p-3 rounded-xl outline-none" placeholder="Descrição"></textarea>
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeModal('modal-story')" class="font-bold text-slate-400">Cancelar</button>
                <button id="btn-save-story" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">Salvar</button>
            </div>
        </div>
    </div>

    <div id="modal-task" class="modal opacity-0 pointer-events-none fixed inset-0 flex items-center justify-center z-50 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-2xl">
            <h4 id="task-modal-title" class="text-xl font-black mb-6 text-slate-800">Nova Tarefa</h4>
            <input type="hidden" id="task-story-id">
            <input type="hidden" id="task-edit-index">
            <div class="space-y-4">
                <input type="text" id="task-title" class="w-full bg-slate-100 p-3 rounded-xl outline-none" placeholder="O que fazer?">
                <input type="text" id="task-owner" class="w-full bg-slate-100 p-3 rounded-xl outline-none" placeholder="Responsável">
                <input type="number" id="task-points" class="w-full bg-slate-100 p-3 rounded-xl outline-none" placeholder="Pontos" value="3">
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeModal('modal-task')" class="font-bold text-slate-400">Cancelar</button>
                <button id="btn-save-task" class="bg-green-600 text-white px-6 py-2 rounded-xl font-bold">Salvar Tarefa</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGQZgIkr2T7DJ880Z0R6Nqi_R4O5zabTw",
            authDomain: "base-scrum.firebaseapp.com",
            projectId: "base-scrum",
            storageBucket: "base-scrum.firebasestorage.app",
            messagingSenderId: "862384072053",
            appId: "1:862384072053:web:922d943b7b95b065381f3c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let activeProjectId = null;
        let storiesData = [];

        window.openModal = (id) => document.getElementById(id).classList.remove('opacity-0', 'pointer-events-none');
        window.closeModal = (id) => document.getElementById(id).classList.add('opacity-0', 'pointer-events-none');
        
        window.switchView = (v) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-button').forEach(b => b.classList.remove('active'));
            document.getElementById('view-'+v).classList.add('active');
            document.querySelector(`[data-view="${v}"]`).classList.add('active');
        };

        // --- GESTÃO DE PROJETOS ---
        onSnapshot(collection(db, "projects"), (snap) => {
            const projects = snap.docs.map(d => ({id: d.id, ...d.data()}));
            const sel = document.getElementById('project-selector');
            sel.innerHTML = projects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
            if(!activeProjectId && projects.length) { activeProjectId = projects[0].id; loadStories(); }
            sel.onchange = (e) => { activeProjectId = e.target.value; loadStories(); };
        });

        function loadStories() {
            const q = query(collection(db, "backlog"), where("projectId", "==", activeProjectId));
            onSnapshot(q, (snap) => {
                storiesData = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderBacklog();
                renderKanban();
            });
        }

        // --- CRUD HISTÓRIAS ---
        window.prepareStoryModal = (storyId = null) => {
            const isEdit = !!storyId;
            document.getElementById('story-modal-title').innerText = isEdit ? "Editar História" : "Nova História";
            document.getElementById('edit-story-id').value = storyId || "";
            
            if(isEdit) {
                const story = storiesData.find(s => s.id === storyId);
                document.getElementById('story-title').value = story.title;
                document.getElementById('story-desc').value = story.description || "";
            } else {
                document.getElementById('story-title').value = "";
                document.getElementById('story-desc').value = "";
            }
            openModal('modal-story');
        };

        document.getElementById('btn-save-story').onclick = async () => {
            const id = document.getElementById('edit-story-id').value;
            const data = {
                title: document.getElementById('story-title').value,
                description: document.getElementById('story-desc').value,
                projectId: activeProjectId
            };

            if(id) {
                await updateDoc(doc(db, "backlog", id), data);
            } else {
                await addDoc(collection(db, "backlog"), { ...data, tasks: [] });
            }
            closeModal('modal-story');
        };

        window.deleteStory = async (id) => {
            if(confirm("Excluir esta história e todas as suas tarefas?")) {
                await deleteDoc(doc(db, "backlog", id));
            }
        };

        // --- CRUD TAREFAS ---
        window.prepareTaskModal = (storyId, taskIndex = null) => {
            const isEdit = taskIndex !== null;
            document.getElementById('task-modal-title').innerText = isEdit ? "Editar Tarefa" : "Nova Tarefa";
            document.getElementById('task-story-id').value = storyId;
            document.getElementById('task-edit-index').value = isEdit ? taskIndex : "";

            if(isEdit) {
                const task = storiesData.find(s => s.id === storyId).tasks[taskIndex];
                document.getElementById('task-title').value = task.title;
                document.getElementById('task-owner').value = task.owner;
                document.getElementById('task-points').value = task.points;
            } else {
                document.getElementById('task-title').value = "";
                document.getElementById('task-owner').value = "";
                document.getElementById('task-points').value = "3";
            }
            openModal('modal-task');
        };

        document.getElementById('btn-save-task').onclick = async () => {
            const sId = document.getElementById('task-story-id').value;
            const idx = document.getElementById('task-edit-index').value;
            const story = storiesData.find(s => s.id === sId);
            const newTasks = [...(story.tasks || [])];

            const taskData = {
                title: document.getElementById('task-title').value,
                owner: document.getElementById('task-owner').value,
                points: parseInt(document.getElementById('task-points').value) || 0,
                status: idx !== "" ? newTasks[idx].status : 'todo',
                id: idx !== "" ? newTasks[idx].id : Date.now().toString()
            };

            if(idx !== "") newTasks[idx] = taskData;
            else newTasks.push(taskData);

            await updateDoc(doc(db, "backlog", sId), { tasks: newTasks });
            closeModal('modal-task');
        };

        window.deleteTask = async (storyId, index) => {
            if(confirm("Excluir esta tarefa?")) {
                const story = storiesData.find(s => s.id === storyId);
                const newTasks = story.tasks.filter((_, i) => i !== index);
                await updateDoc(doc(db, "backlog", storyId), { tasks: newTasks });
            }
        };

        // --- RENDERIZAÇÃO ---
        function renderBacklog() {
            document.getElementById('backlog-container').innerHTML = storiesData.map(story => `
                <div class="bg-white p-6 rounded-2xl border border-slate-200 flex justify-between items-center shadow-sm">
                    <div>
                        <h4 class="font-bold text-slate-800">${story.title}</h4>
                        <p class="text-xs text-slate-500">${story.description || 'Sem descrição'}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="prepareTaskModal('${story.id}')" class="bg-blue-50 text-blue-600 px-3 py-1.5 rounded-lg text-xs font-bold">Add Task</button>
                        <button onclick="prepareStoryModal('${story.id}')" class="text-slate-400 hover:text-blue-600 p-2"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteStory('${story.id}')" class="text-slate-400 hover:text-red-600 p-2"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function renderKanban() {
            const cols = { todo: document.getElementById('col-todo'), doing: document.getElementById('col-doing'), done: document.getElementById('col-done') };
            Object.values(cols).forEach(c => c.innerHTML = '');
            
            storiesData.forEach(story => {
                (story.tasks || []).forEach((task, index) => {
                    const card = document.createElement('div');
                    card.className = "bg-white p-4 rounded-xl shadow-sm border border-slate-200 relative group cursor-grab active:cursor-grabbing";
                    card.draggable = true;
                    card.innerHTML = `
                        <div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity flex gap-2">
                            <button onclick="prepareTaskModal('${story.id}', ${index})" class="text-blue-500 text-[10px]"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteTask('${story.id}', ${index})" class="text-red-500 text-[10px]"><i class="fas fa-trash"></i></button>
                        </div>
                        <h5 class="text-sm font-bold text-slate-800 pr-8">${task.title}</h5>
                        <p class="text-[10px] text-slate-400 mt-2 font-bold uppercase">${task.owner} | ${task.points} pts</p>
                    `;
                    card.ondragstart = (e) => { e.dataTransfer.setData("sId", story.id); e.dataTransfer.setData("tIdx", index); };
                    if(cols[task.status]) cols[task.status].appendChild(card);
                });
            });
        }

        // --- DRAG & DROP ---
        document.querySelectorAll('.kanban-column').forEach(col => {
            col.ondragover = (e) => e.preventDefault();
            col.ondrop = async (e) => {
                const sId = e.dataTransfer.getData("sId");
                const tIdx = parseInt(e.dataTransfer.getData("tIdx"));
                const newStatus = col.getAttribute('data-status');
                const story = storiesData.find(s => s.id === sId);
                const newTasks = [...story.tasks];
                newTasks[tIdx].status = newStatus;
                await updateDoc(doc(db, "backlog", sId), { tasks: newTasks });
            };
        });
    </script>
</body>
</html>
