<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectPro Ultra - Firebase Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; } /* [cite: 2] */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; } /* [cite: 3] */
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; } /* [cite: 4] */
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; } /* [cite: 5] */
        .tab-content { display: none; opacity: 0; transform: translateY(10px); transition: all 0.3s ease; } /* [cite: 6] */
        .tab-content.active { display: block; opacity: 1; transform: translateY(0); } /* [cite: 7] */
        .nav-button.active { background-color: #2563eb; color: white; box-shadow: 0 4px 12px -2px rgba(37, 99, 235, 0.3); } /* [cite: 8, 9] */
        .gantt-bar { height: 32px; border-radius: 6px; position: absolute; display: flex; align-items: center; padding: 0 12px; font-size: 11px; font-weight: 600; cursor: pointer; transition: transform 0.2s; } /* [cite: 10, 11] */
        .gantt-bar:hover { transform: scale(1.02); z-index: 10; } /* [cite: 12] */
        .modal { transition: opacity 0.25s ease; }
        body.modal-active { overflow: hidden; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen overflow-hidden">

    <div class="flex h-full">
        <aside class="w-72 bg-white border-r border-slate-200 flex flex-col shrink-0 shadow-sm z-30">
            <div class="p-6 border-b border-slate-100 bg-white">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                        <i class="fas fa-project-diagram"></i>
                    </div>
                    <div>
                        <h1 class="font-black text-lg text-blue-900 tracking-tight">ProjectPro</h1>
                        <p class="text-[9px] text-blue-500 font-extrabold tracking-tighter uppercase">Scrum Master Suite</p>
                    </div>
                </div>
            </div>

            <div class="p-4 bg-slate-50 border-b border-slate-100">
                <label class="text-[10px] font-bold text-slate-400 px-1 mb-2 block uppercase tracking-widest">Selecionar Projeto</label>
                <div class="relative group">
                    <select id="project-selector" class="w-full bg-white border border-slate-200 rounded-lg px-4 py-3 text-sm font-semibold text-slate-700 appearance-none cursor-pointer focus:ring-2 focus:ring-blue-500 outline-none"></select>
                    <i class="fas fa-chevron-down absolute right-4 top-4 text-slate-400 pointer-events-none transition-transform group-hover:translate-y-0.5"></i>
                </div>
                <button onclick="openModal('modal-new-project')" class="mt-3 w-full border-2 border-dashed border-slate-300 rounded-lg py-2 text-xs font-bold text-slate-500 hover:border-blue-400 hover:text-blue-600 transition-all flex items-center justify-center gap-2">
                    <i class="fas fa-plus"></i> Novo Projeto
                </button>
            </div>

            <nav class="flex-1 p-4 space-y-2 overflow-y-auto custom-scrollbar">
                <p class="text-[10px] font-bold text-slate-400 px-4 mb-2 tracking-widest uppercase">Visualizações</p>
                <button onclick="switchView('backlog')" class="nav-button w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-50 transition-all active" data-view="backlog">
                    <i class="fas fa-layer-group w-5"></i> <span class="text-sm font-semibold">Backlog do Produto</span>
                </button>
                <button onclick="switchView('sprint')" class="nav-button w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-50 transition-all" data-view="sprint">
                    <i class="fas fa-columns w-5"></i> <span class="text-sm font-semibold">Sprint & Kanban</span>
                </button>
                <button onclick="switchView('gantt')" class="nav-button w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-50 transition-all" data-view="gantt">
                    <i class="fas fa-calendar-alt w-5"></i> <span class="text-sm font-semibold">Cronograma Gantt</span>
                </button>
            </nav>

            <div class="p-6 border-t border-slate-100">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center font-bold text-blue-600">JS</div>
                    <div>
                        <p class="text-sm font-bold text-slate-800">João Silva</p>
                        <p class="text-[10px] text-slate-400 uppercase font-bold">Project Manager</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-20 bg-white border-b border-slate-200 px-8 flex items-center justify-between shrink-0">
                <div class="flex items-center gap-4">
                    <h2 class="text-xl font-extrabold text-slate-800" id="current-project-title">Carregando...</h2>
                    <span class="bg-blue-100 text-blue-700 text-[10px] font-black px-2 py-1 rounded-md uppercase" id="project-tag">Ativo</span>
                </div>
                <div class="flex items-center gap-4">
                    <button class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-full text-sm font-bold shadow-lg shadow-blue-200 transition-all">
                        <i class="fas fa-cloud mr-2"></i> Cloud Sync
                    </button>
                </div>
            </header>

            <section class="flex-1 p-8 overflow-y-auto custom-scrollbar bg-slate-50">
                <div id="view-backlog" class="tab-content active space-y-8">
                    <div class="flex justify-between items-center">
                        <h3 class="text-2xl font-black text-slate-800">Backlog do Produto</h3>
                        <button onclick="openModal('modal-new-story')" class="bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 shadow-sm">
                            <i class="fas fa-plus text-blue-600"></i> Nova História de Usuário
                        </button>
                    </div>
                    <div id="backlog-stories-container" class="space-y-6"></div>
                </div>

                <div id="view-sprint" class="tab-content h-full flex flex-col space-y-6">
                    <div class="flex justify-between items-center shrink-0">
                        <div class="flex items-center gap-4">
                            <h3 class="text-2xl font-black text-slate-800">Sprint & Kanban</h3>
                            <select id="sprint-selector" class="bg-white border border-slate-200 rounded-lg px-3 py-1.5 text-sm font-bold text-blue-600 outline-none">
                                <option value="1">Sprint 01 (Atual)</option>
                                <option value="2">Sprint 02 (Próxima)</option>
                            </select>
                        </div>
                    </div>

                    <div class="flex-1 flex gap-6 overflow-x-auto pb-4 custom-scrollbar">
                        <div class="min-w-[320px] flex-1 flex flex-col">
                            <div class="flex items-center justify-between px-2 mb-4">
                                <span class="text-xs font-black text-slate-400 uppercase tracking-widest">Para Fazer</span>
                                <span class="bg-slate-200 text-slate-600 text-[10px] px-2 py-0.5 rounded-full" id="count-todo">0</span>
                            </div>
                            <div id="col-todo" class="flex-1 bg-slate-200/40 rounded-2xl p-3 space-y-3 min-h-[300px]"></div>
                        </div>
                        <div class="min-w-[320px] flex-1 flex flex-col">
                            <div class="flex items-center justify-between px-2 mb-4">
                                <span class="text-xs font-black text-slate-400 uppercase tracking-widest">Desenvolvimento</span>
                                <span class="bg-blue-100 text-blue-600 text-[10px] px-2 py-0.5 rounded-full" id="count-doing">0</span>
                            </div>
                            <div id="col-doing" class="flex-1 bg-blue-100/20 rounded-2xl p-3 space-y-3 min-h-[300px]"></div>
                        </div>
                        <div class="min-w-[320px] flex-1 flex flex-col">
                            <div class="flex items-center justify-between px-2 mb-4">
                                <span class="text-xs font-black text-slate-400 uppercase tracking-widest">Concluído</span>
                                <span class="bg-green-100 text-green-600 text-[10px] px-2 py-0.5 rounded-full" id="count-done">0</span>
                            </div>
                            <div id="col-done" class="flex-1 bg-green-100/20 rounded-2xl p-3 space-y-3 min-h-[300px]"></div>
                        </div>
                    </div>
                </div>

                <div id="view-gantt" class="tab-content">
                    <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden flex flex-col h-[700px]">
                        <div class="p-8 border-b border-slate-100 bg-white sticky top-0 z-20">
                            <h3 class="text-xl font-black text-slate-800">Cronograma de Atividades</h3>
                            <p class="text-xs text-slate-400 font-medium">Sincronizado com Firebase Cloud</p>
                        </div>
                        <div class="flex-1 overflow-auto custom-scrollbar">
                            <div class="inline-block min-w-full">
                                <div class="flex border-b border-slate-100 sticky top-0 bg-white z-10" id="gantt-header">
                                    <div class="w-72 flex-shrink-0 border-r border-slate-100 p-4 font-black text-slate-400 text-[10px] uppercase tracking-widest">Task / Epic</div>
                                    <div class="flex flex-1" id="gantt-days-row"></div>
                                </div>
                                <div id="gantt-rows-container"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-new-project" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
        <div class="modal-overlay absolute w-full h-full bg-slate-900 opacity-50" onclick="closeModal('modal-new-project')"></div>
        <div class="modal-container bg-white w-11/12 md:max-w-md mx-auto rounded-3xl shadow-2xl z-50 p-8">
            <h4 class="text-2xl font-black text-slate-800 mb-6">Criar Novo Projeto</h4>
            <div class="space-y-4">
                <input type="text" id="new-project-name" class="w-full bg-slate-100 border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Ex: E-commerce 2.0">
                <div class="flex justify-end gap-3 mt-8">
                    <button onclick="closeModal('modal-new-project')" class="px-6 py-2 rounded-xl text-sm font-bold text-slate-500 hover:bg-slate-100">Cancelar</button>
                    <button id="btn-save-project" class="px-6 py-2 rounded-xl text-sm font-bold bg-blue-600 text-white shadow-lg shadow-blue-200">Criar no Firestore</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-new-story" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
        <div class="modal-overlay absolute w-full h-full bg-slate-900 opacity-50" onclick="closeModal('modal-new-story')"></div>
        <div class="modal-container bg-white w-11/12 md:max-w-md mx-auto rounded-3xl shadow-2xl z-50 p-8">
            <h4 class="text-2xl font-black text-slate-800 mb-6">Nova História de Usuário</h4>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Título da História</label>
                    <input type="text" id="new-story-title" class="w-full bg-slate-100 border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Como usuário, quero...">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Tarefa Inicial</label>
                        <input type="text" id="new-task-name" class="w-full bg-slate-100 border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Nome da tarefa">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Pontos (Fibonacci)</label>
                        <input type="number" id="new-task-points" class="w-full bg-slate-100 border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none" value="5">
                    </div>
                </div>
                <div class="flex justify-end gap-3 mt-8">
                    <button onclick="closeModal('modal-new-story')" class="px-6 py-2 rounded-xl text-sm font-bold text-slate-500 hover:bg-slate-100">Cancelar</button>
                    <button id="btn-save-story" class="px-6 py-2 rounded-xl text-sm font-bold bg-blue-600 text-white">Salvar no Backlog</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGQZgIkr2T7DJ880Z0R6Nqi_R4O5zabTw",
            authDomain: "base-scrum.firebaseapp.com",
            projectId: "base-scrum",
            storageBucket: "base-scrum.firebasestorage.app",
            messagingSenderId: "862384072053",
            appId: "1:862384072053:web:922d943b7b95b065381f3c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let projects = [];
        let activeProjectId = null;
        let backlogData = [];

        window.switchView = (viewId) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-button').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            const btn = document.querySelector(`[data-view="${viewId}"]`);
            if(btn) btn.classList.add('active');
            if (viewId === 'gantt') initGantt();
        };

        window.openModal = (id) => {
            document.getElementById(id).classList.remove('opacity-0', 'pointer-events-none');
            document.body.classList.add('modal-active');
        };

        window.closeModal = (id) => {
            document.getElementById(id).classList.add('opacity-0', 'pointer-events-none');
            document.body.classList.remove('modal-active');
        };

        // Escuta projetos [cite: 55]
        onSnapshot(collection(db, "projects"), (snapshot) => {
            projects = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            populateProjectSelector();
            if (!activeProjectId && projects.length > 0) {
                activeProjectId = projects[0].id;
                loadProjectData();
            }
        });

        function populateProjectSelector() {
            const selector = document.getElementById('project-selector');
            selector.innerHTML = projects.map(p => `<option value="${p.id}" ${p.id === activeProjectId ? 'selected' : ''}>${p.name}</option>`).join('');
            selector.onchange = (e) => {
                activeProjectId = e.target.value;
                loadProjectData();
            };
        }

        function loadProjectData() {
            const project = projects.find(p => p.id === activeProjectId);
            if (!project) return;
            document.getElementById('current-project-title').innerText = project.name;
            document.getElementById('project-tag').innerText = project.tag || 'Ativo';
            
            const q = query(collection(db, "backlog"), where("projectId", "==", activeProjectId));
            onSnapshot(q, (snapshot) => {
                backlogData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderBacklog();
                renderKanban();
            });
        }

        // SALVAR NOVO PROJETO
        document.getElementById('btn-save-project').onclick = async () => {
            const name = document.getElementById('new-project-name').value;
            if (!name) return;
            await addDoc(collection(db, "projects"), { name, tag: 'Ativo', createdAt: new Date() });
            closeModal('modal-new-project');
            document.getElementById('new-project-name').value = '';
        };

        // SALVAR NOVA HISTÓRIA (ADICIONADO)
        document.getElementById('btn-save-story').onclick = async () => {
            const title = document.getElementById('new-story-title').value;
            const taskName = document.getElementById('new-task-name').value;
            const points = parseInt(document.getElementById('new-task-points').value);

            if (!title || !activeProjectId) return;

            const newStory = {
                projectId: activeProjectId,
                title: title,
                tasks: [
                    { title: taskName || 'Tarefa Inicial', points: points || 0, status: 'todo', sprintId: 1, start: 2, duration: 4 }
                ]
            };

            await addDoc(collection(db, "backlog"), newStory);
            closeModal('modal-new-story');
            document.getElementById('new-story-title').value = '';
            document.getElementById('new-task-name').value = '';
        };

        function renderBacklog() {
            const container = document.getElementById('backlog-stories-container');
            container.innerHTML = backlogData.map(story => `
                <div class="bg-white rounded-3xl border border-slate-200 p-6 shadow-sm">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex gap-4">
                            <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600 font-black italic">US</div>
                            <div>
                                <h4 class="text-lg font-bold text-slate-800">${story.title}</h4>
                                <p class="text-[10px] text-slate-400 font-bold uppercase">História do Usuário</p>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-2">
                        ${(story.tasks || []).map(task => `
                            <div class="flex items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-100">
                                <span class="text-sm font-semibold text-slate-700">${task.title}</span>
                                <span class="bg-blue-50 text-blue-600 text-[10px] font-bold px-2 py-0.5 rounded">${task.points} pts</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function renderKanban() {
            const currentSprint = parseInt(document.getElementById('sprint-selector').value);
            const cols = { todo: document.getElementById('col-todo'), doing: document.getElementById('col-doing'), done: document.getElementById('col-done') };
            Object.values(cols).forEach(c => c.innerHTML = '');
            let counts = { todo: 0, doing: 0, done: 0 };

            backlogData.forEach(story => {
                (story.tasks || []).forEach(task => {
                    if (task.sprintId === currentSprint) {
                        counts[task.status]++;
                        const card = document.createElement('div');
                        card.className = "bg-white p-4 rounded-2xl shadow-sm border border-slate-100 hover:shadow-lg transition-all cursor-grab";
                        card.innerHTML = `<h5 class="text-sm font-bold text-slate-800">${task.title}</h5>`;
                        cols[task.status].appendChild(card);
                    }
                });
            });

            document.getElementById('count-todo').innerText = counts.todo;
            document.getElementById('count-doing').innerText = counts.doing;
            document.getElementById('count-done').innerText = counts.done;
        }

        function initGantt() {
            const headerRow = document.getElementById('gantt-days-row');
            const rowsContainer = document.getElementById('gantt-rows-container');
            headerRow.innerHTML = ''; rowsContainer.innerHTML = '';
            const daysArr = Array.from({ length: 21 }, (_, i) => i + 1);
            daysArr.forEach(d => {
                const div = document.createElement('div');
                div.className = "flex-1 min-w-[50px] text-center border-r border-slate-50 py-4";
                div.innerHTML = `<span class="text-xs font-bold text-slate-700">${d + 9}</span>`;
                headerRow.appendChild(div);
            });
            backlogData.forEach(story => {
                (story.tasks || []).forEach(task => {
                    const row = document.createElement('div');
                    row.className = "flex border-b border-slate-50 group";
                    row.innerHTML = `
                        <div class="w-72 flex-shrink-0 border-r border-slate-100 p-4 bg-white z-10 sticky left-0">
                            <span class="text-xs font-bold text-slate-800 truncate block">${task.title}</span>
                        </div>
                        <div class="flex flex-1 relative min-h-[64px]">
                            <div class="gantt-bar absolute top-1/2 -translate-y-1/2 bg-blue-600 text-white" 
                                 style="left: calc(${(task.start / 21) * 100}% + 4px); width: calc(${(task.duration / 21) * 100}% - 8px)">
                                 <span class="truncate ml-2">${task.points}pts</span>
                            </div>
                        </div>
                    `;
                    rowsContainer.appendChild(row);
                });
            });
        }
    </script>
</body>
</html>
