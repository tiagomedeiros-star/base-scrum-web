<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectPro Ultra - Kanban Interativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; } 
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; } 
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; } 
        .tab-content { display: none; opacity: 0; transform: translateY(10px); transition: all 0.3s ease; } 
        .tab-content.active { display: block; opacity: 1; transform: translateY(0); } 
        .nav-button.active { background-color: #2563eb; color: white; box-shadow: 0 4px 12px -2px rgba(37, 99, 235, 0.3); } 
        .modal { transition: opacity 0.25s ease; }
        .dragging { opacity: 0.5; transform: scale(0.95); }
        .drag-over { background-color: rgba(37, 99, 235, 0.1) !important; border: 2px dashed #2563eb !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen overflow-hidden">

    <div class="flex h-full">
        <aside class="w-72 bg-white border-r border-slate-200 flex flex-col shrink-0 shadow-sm z-30">
            <div class="p-6 border-b border-slate-100">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fas fa-project-diagram"></i></div>
                    <div>
                        <h1 class="font-black text-lg text-blue-900 tracking-tight">ProjectPro</h1>
                        <p class="text-[9px] text-blue-500 font-extrabold uppercase">Scrum Master Suite</p>
                    </div>
                </div>
            </div>

            <div class="p-4 bg-slate-50 border-b border-slate-100">
                <label class="text-[10px] font-bold text-slate-400 px-1 mb-2 block uppercase">Selecionar Projeto</label>
                <select id="project-selector" class="w-full bg-white border border-slate-200 rounded-lg px-4 py-3 text-sm font-semibold outline-none"></select>
                <button onclick="openModal('modal-new-project')" class="mt-3 w-full border-2 border-dashed border-slate-300 rounded-lg py-2 text-xs font-bold text-slate-500 hover:text-blue-600 transition-all">+ Novo Projeto</button>
            </div>

            <nav class="flex-1 p-4 space-y-2">
                <button onclick="switchView('backlog')" class="nav-button w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 active" data-view="backlog">
                    <i class="fas fa-layer-group w-5"></i> <span class="text-sm font-semibold">Backlog do Produto</span>
                </button>
                <button onclick="switchView('sprint')" class="nav-button w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600" data-view="sprint">
                    <i class="fas fa-columns w-5"></i> <span class="text-sm font-semibold">Sprint & Kanban</span>
                </button>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-20 bg-white border-b border-slate-200 px-8 flex items-center justify-between">
                <h2 class="text-xl font-extrabold text-slate-800" id="current-project-title">Carregando...</h2>
                <div class="flex items-center gap-2">
                    <span class="text-xs font-bold text-green-500"><i class="fas fa-circle text-[8px] mr-1"></i> Live Sync On</span>
                </div>
            </header>

            <section class="flex-1 p-8 overflow-y-auto bg-slate-50">
                <div id="view-backlog" class="tab-content active space-y-8">
                    <div class="flex justify-between items-center">
                        <h3 class="text-2xl font-black text-slate-800">Backlog do Produto</h3>
                        <button onclick="openModal('modal-new-story')" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold">Nova História</button>
                    </div>
                    <div id="backlog-stories-container" class="grid gap-6"></div>
                </div>

                <div id="view-sprint" class="tab-content h-full">
                    <div class="flex gap-6 h-full overflow-x-auto pb-4">
                        <div class="min-w-[320px] flex-1 flex flex-col">
                            <span class="text-xs font-black text-slate-400 uppercase mb-4">Para Fazer (<span id="count-todo">0</span>)</span>
                            <div id="col-todo" data-status="todo" class="kanban-column flex-1 bg-slate-200/40 rounded-2xl p-3 space-y-3 transition-colors border-2 border-transparent"></div>
                        </div>
                        <div class="min-w-[320px] flex-1 flex flex-col">
                            <span class="text-xs font-black text-slate-400 uppercase mb-4">Desenvolvimento (<span id="count-doing">0</span>)</span>
                            <div id="col-doing" data-status="doing" class="kanban-column flex-1 bg-blue-100/20 rounded-2xl p-3 space-y-3 transition-colors border-2 border-transparent"></div>
                        </div>
                        <div class="min-w-[320px] flex-1 flex flex-col">
                            <span class="text-xs font-black text-slate-400 uppercase mb-4">Concluído (<span id="count-done">0</span>)</span>
                            <div id="col-done" data-status="done" class="kanban-column flex-1 bg-green-100/20 rounded-2xl p-3 space-y-3 transition-colors border-2 border-transparent"></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-new-project" class="modal opacity-0 pointer-events-none fixed inset-0 flex items-center justify-center z-50 bg-slate-900/50">
        <div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-2xl">
            <h4 class="text-2xl font-black mb-6">Novo Projeto</h4>
            <input type="text" id="new-project-name" class="w-full bg-slate-100 p-4 rounded-xl outline-none" placeholder="Nome do Projeto">
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeModal('modal-new-project')" class="font-bold text-slate-500">Cancelar</button>
                <button id="btn-save-project" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">Criar</button>
            </div>
        </div>
    </div>

    <div id="modal-new-story" class="modal opacity-0 pointer-events-none fixed inset-0 flex items-center justify-center z-50 bg-slate-900/50">
        <div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-2xl">
            <h4 class="text-2xl font-black mb-6">Nova História</h4>
            <div class="space-y-4">
                <input type="text" id="new-story-title" class="w-full bg-slate-100 p-4 rounded-xl outline-none" placeholder="Título da História">
                <input type="text" id="new-task-name" class="w-full bg-slate-100 p-4 rounded-xl outline-none" placeholder="Nome da Tarefa Inicial">
                <input type="number" id="new-task-points" class="w-full bg-slate-100 p-4 rounded-xl outline-none" value="3">
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeModal('modal-new-story')" class="font-bold text-slate-500">Cancelar</button>
                <button id="btn-save-story" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">Salvar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGQZgIkr2T7DJ880Z0R6Nqi_R4O5zabTw",
            authDomain: "base-scrum.firebaseapp.com",
            projectId: "base-scrum",
            storageBucket: "base-scrum.firebasestorage.app",
            messagingSenderId: "862384072053",
            appId: "1:862384072053:web:922d943b7b95b065381f3c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let activeProjectId = null;
        let backlogData = [];

        // --- UTILITÁRIOS ---
        window.openModal = (id) => document.getElementById(id).classList.remove('opacity-0', 'pointer-events-none');
        window.closeModal = (id) => document.getElementById(id).classList.add('opacity-0', 'pointer-events-none');
        window.switchView = (v) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-button').forEach(b => b.classList.remove('active'));
            document.getElementById('view-'+v).classList.add('active');
            document.querySelector(`[data-view="${v}"]`).classList.add('active');
        };

        // --- FIREBASE: PROJETOS ---
        onSnapshot(collection(db, "projects"), (snap) => {
            const projects = snap.docs.map(d => ({id: d.id, ...d.data()}));
            const sel = document.getElementById('project-selector');
            sel.innerHTML = projects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
            if(!activeProjectId && projects.length) { activeProjectId = projects[0].id; loadData(); }
            sel.onchange = (e) => { activeProjectId = e.target.value; loadData(); };
        });

        function loadData() {
            const q = query(collection(db, "backlog"), where("projectId", "==", activeProjectId));
            onSnapshot(q, (snap) => {
                backlogData = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderAll();
            });
        }

        // --- SALVAR DADOS ---
        document.getElementById('btn-save-project').onclick = async () => {
            const name = document.getElementById('new-project-name').value;
            if(name) await addDoc(collection(db, "projects"), { name, createdAt: new Date() });
            closeModal('modal-new-project');
            document.getElementById('new-project-name').value = '';
        };

        document.getElementById('btn-save-story').onclick = async () => {
            const title = document.getElementById('new-story-title').value;
            const tName = document.getElementById('new-task-name').value;
            const pts = parseInt(document.getElementById('new-task-points').value);
            if(title && activeProjectId) {
                await addDoc(collection(db, "backlog"), {
                    projectId: activeProjectId,
                    title: title,
                    tasks: [{ title: tName || "Nova Tarefa", points: pts || 0, status: 'todo' }]
                });
                closeModal('modal-new-story');
            }
        };

        // --- RENDERIZAÇÃO E DRAG & DROP ---
        function renderAll() {
            // Render Backlog
            document.getElementById('backlog-stories-container').innerHTML = backlogData.map(s => `
                <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                    <h4 class="font-bold text-slate-800 mb-4">${s.title}</h4>
                    <div class="space-y-2">${(s.tasks || []).map(t => `
                        <div class="bg-slate-50 p-3 rounded-xl flex justify-between text-sm">
                            <span>${t.title}</span>
                            <span class="font-bold text-blue-600">${t.points} pts</span>
                        </div>`).join('')}
                    </div>
                </div>
            `).join('');

            // Render Kanban
            const cols = { todo: document.getElementById('col-todo'), doing: document.getElementById('col-doing'), done: document.getElementById('col-done') };
            Object.values(cols).forEach(c => c.innerHTML = '');
            let counts = { todo: 0, doing: 0, done: 0 };

            backlogData.forEach(story => {
                story.tasks?.forEach((task, index) => {
                    if(cols[task.status]) {
                        counts[task.status]++;
                        const card = document.createElement('div');
                        card.className = "bg-white p-4 rounded-2xl shadow-sm border border-slate-100 font-bold text-sm cursor-grab active:cursor-grabbing hover:shadow-md transition-all";
                        card.draggable = true;
                        card.innerText = task.title;
                        
                        // Eventos do Card
                        card.ondragstart = (e) => {
                            e.dataTransfer.setData("storyId", story.id);
                            e.dataTransfer.setData("taskIndex", index);
                            card.classList.add('dragging');
                        };
                        card.ondragend = () => card.classList.remove('dragging');

                        cols[task.status].appendChild(card);
                    }
                });
            });

            document.getElementById('count-todo').innerText = counts.todo;
            document.getElementById('count-doing').innerText = counts.doing;
            document.getElementById('count-done').innerText = counts.done;
        }

        // Configurar as Colunas para receber os cards
        document.querySelectorAll('.kanban-column').forEach(column => {
            column.ondragover = (e) => {
                e.preventDefault(); // Necessário para permitir o drop
                column.classList.add('drag-over');
            };

            column.ondragleave = () => column.classList.remove('drag-over');

            column.ondrop = async (e) => {
                e.preventDefault();
                column.classList.remove('drag-over');
                
                const storyId = e.dataTransfer.getData("storyId");
                const taskIndex = parseInt(e.dataTransfer.getData("taskIndex"));
                const newStatus = column.getAttribute('data-status');

                if (storyId && !isNaN(taskIndex)) {
                    await updateTaskStatus(storyId, taskIndex, newStatus);
                }
            };
        });

        // Função para atualizar o Firestore
        async function updateTaskStatus(storyId, taskIndex, newStatus) {
            const story = backlogData.find(s => s.id === storyId);
            if (!story) return;

            // Criar uma cópia do array de tarefas e modificar o status
            const updatedTasks = [...story.tasks];
            if (updatedTasks[taskIndex].status === newStatus) return; // Se for o mesmo status, não faz nada
            
            updatedTasks[taskIndex].status = newStatus;

            // Salvar de volta no Firestore
            const storyRef = doc(db, "backlog", storyId);
            try {
                await updateDoc(storyRef, { tasks: updatedTasks });
                console.log("Status atualizado com sucesso!");
            } catch (error) {
                console.error("Erro ao atualizar status:", error);
            }
        }
    </script>
</body>
</html>
