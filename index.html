<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectPro Sprint - Sprints & Stories</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .tab-content { display: none; opacity: 0; transform: translateY(10px); transition: all 0.3s ease; }
        .tab-content.active { display: block; opacity: 1; transform: translateY(0); }
        .nav-button.active { background-color: #2563eb; color: white; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.3); }
        .modal { transition: opacity 0.25s ease; }
        .kanban-column.drag-over { background-color: rgba(59, 130, 246, 0.1); border: 2px dashed #3b82f6; }
        .dragging { opacity: 0.5; transform: scale(0.95); }
        .badge-p1 { background-color: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .badge-p2 { background-color: #ffedd5; color: #ea580c; border: 1px solid #fed7aa; }
        .badge-p3 { background-color: #dbeafe; color: #2563eb; border: 1px solid #bfdbfe; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen overflow-hidden">

    <div class="flex h-full">
        <aside class="w-72 bg-white border-r border-slate-200 flex flex-col shrink-0 shadow-sm z-30">
            <div class="p-6 border-b border-slate-100">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fas fa-bolt"></i></div>
                    <div>
                        <h1 class="font-black text-lg text-blue-900">SprintMaster</h1>
                        <p class="text-[9px] text-blue-500 font-extrabold uppercase">Agile Suite</p>
                    </div>
                </div>
            </div>

            <div class="p-4 bg-slate-50 border-b border-slate-100">
                <label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Projeto Ativo</label>
                <div class="relative mb-3">
                    <select id="project-selector" class="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm font-semibold outline-none appearance-none"></select>
                    <i class="fas fa-chevron-down absolute right-3 top-3 text-slate-400 text-xs pointer-events-none"></i>
                </div>
                
                <div class="grid grid-cols-2 gap-2 mb-3">
                    <button onclick="openEditProjectModal()" class="flex items-center justify-center gap-2 bg-white border border-slate-200 text-slate-600 py-2 rounded-lg text-[10px] font-bold hover:bg-slate-100 transition-all">
                        <i class="fas fa-edit"></i> Editar
                    </button>
                    <button onclick="deleteProject()" class="flex items-center justify-center gap-2 bg-red-50 border border-red-100 text-red-600 py-2 rounded-lg text-[10px] font-bold hover:bg-red-100 transition-all">
                        <i class="fas fa-trash-alt"></i> Excluir
                    </button>
                </div>

                <button onclick="openModal('modal-new-project')" class="w-full border-2 border-dashed border-slate-300 rounded-lg py-2 text-xs font-bold text-slate-500 hover:text-blue-600 hover:border-blue-400 transition-all">+ Novo Projeto</button>
            </div>

            <nav class="flex-1 p-4 space-y-2">
                <button onclick="switchView('backlog')" class="nav-button w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 active" data-view="backlog">
                    <i class="fas fa-list-ul w-5"></i> <span class="text-sm font-semibold">Backlog & Histórias</span>
                </button>
                <button onclick="switchView('sprint')" class="nav-button w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600" data-view="sprint">
                    <i class="fas fa-columns w-5"></i> <span class="text-sm font-semibold">Sprint Board</span>
                </button>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 bg-white border-b border-slate-200 px-8 flex items-center justify-between shrink-0">
                <div class="flex items-center gap-4">
                    <h2 class="text-xl font-extrabold text-slate-800" id="current-project-title">Carregando...</h2>
                    <span class="px-2 py-1 bg-green-100 text-green-700 rounded text-[10px] font-bold uppercase">Sprint Ativa</span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="text-right">
                        <p class="text-xs font-bold text-slate-600">Velocity</p>
                        <p class="text-xs text-slate-400"><span id="total-points">0</span> pts planejados</p>
                    </div>
                </div>
            </header>

            <section class="flex-1 p-8 overflow-y-auto bg-slate-50 custom-scrollbar">
                <div id="view-backlog" class="tab-content active space-y-6">
                    <div class="flex justify-between items-center">
                        <h3 class="text-2xl font-black text-slate-800">Histórias de Usuário</h3>
                        <button onclick="openModal('modal-new-story')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-lg transition-all">
                            <i class="fas fa-plus mr-2"></i> Nova História
                        </button>
                    </div>
                    <div id="backlog-container" class="space-y-6"></div>
                </div>

                <div id="view-sprint" class="tab-content h-full">
                    <div class="flex gap-6 h-full overflow-x-auto pb-4">
                        <div class="min-w-[320px] flex-1 flex flex-col">
                            <div class="flex justify-between items-center mb-4 px-2">
                                <span class="text-xs font-black text-slate-400 uppercase tracking-widest">A Fazer</span>
                                <span class="bg-slate-200 text-slate-600 text-[10px] px-2 py-0.5 rounded-full font-bold" id="count-todo">0</span>
                            </div>
                            <div id="col-todo" data-status="todo" class="kanban-column flex-1 bg-slate-200/50 rounded-2xl p-3 space-y-3 min-h-[200px] border-2 border-transparent transition-colors"></div>
                        </div>

                        <div class="min-w-[320px] flex-1 flex flex-col">
                            <div class="flex justify-between items-center mb-4 px-2">
                                <span class="text-xs font-black text-slate-400 uppercase tracking-widest">Em Andamento</span>
                                <span class="bg-blue-100 text-blue-600 text-[10px] px-2 py-0.5 rounded-full font-bold" id="count-doing">0</span>
                            </div>
                            <div id="col-doing" data-status="doing" class="kanban-column flex-1 bg-blue-50 rounded-2xl p-3 space-y-3 min-h-[200px] border-2 border-transparent transition-colors"></div>
                        </div>

                        <div class="min-w-[320px] flex-1 flex flex-col">
                            <div class="flex justify-between items-center mb-4 px-2">
                                <span class="text-xs font-black text-slate-400 uppercase tracking-widest">Concluído</span>
                                <span class="bg-green-100 text-green-600 text-[10px] px-2 py-0.5 rounded-full font-bold" id="count-done">0</span>
                            </div>
                            <div id="col-done" data-status="done" class="kanban-column flex-1 bg-green-50 rounded-2xl p-3 space-y-3 min-h-[200px] border-2 border-transparent transition-colors"></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-new-project" class="modal opacity-0 pointer-events-none fixed inset-0 flex items-center justify-center z-50 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-2xl">
            <h4 class="text-2xl font-black mb-6">Novo Projeto</h4>
            <input type="text" id="new-project-name" class="w-full bg-slate-100 p-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="Nome do Projeto">
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeModal('modal-new-project')" class="font-bold text-slate-500">Cancelar</button>
                <button id="btn-save-project" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-700">Criar Projeto</button>
            </div>
        </div>
    </div>

    <div id="modal-edit-project" class="modal opacity-0 pointer-events-none fixed inset-0 flex items-center justify-center z-50 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-2xl">
            <h4 class="text-2xl font-black mb-6">Editar Projeto</h4>
            <input type="text" id="edit-project-name" class="w-full bg-slate-100 p-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="Nome do Projeto">
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeModal('modal-edit-project')" class="font-bold text-slate-500">Cancelar</button>
                <button id="btn-update-project" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-700">Salvar Alterações</button>
            </div>
        </div>
    </div>

    <div id="modal-new-story" class="modal opacity-0 pointer-events-none fixed inset-0 flex items-center justify-center z-50 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-lg p-8 rounded-3xl shadow-2xl">
            <h4 class="text-2xl font-black mb-6 text-slate-800">Criar História de Usuário</h4>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Título da História</label>
                    <input type="text" id="story-title" class="w-full bg-slate-100 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ex: Como usuário, quero logar no sistema...">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Prioridade</label>
                        <select id="story-priority" class="w-full bg-slate-100 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer">
                            <option value="P1">P1 - Alta (Crítica)</option>
                            <option value="P2" selected>P2 - Média (Normal)</option>
                            <option value="P3">P3 - Baixa (Desejável)</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Estimativa Total (Auto)</label>
                        <div class="p-3 bg-slate-50 rounded-xl text-slate-400 text-sm italic">Calculado pelas tasks</div>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Descrição</label>
                    <textarea id="story-desc" rows="3" class="w-full bg-slate-100 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="Detalhes e critérios de aceitação..."></textarea>
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeModal('modal-new-story')" class="font-bold text-slate-400 hover:text-slate-600">Cancelar</button>
                <button id="btn-create-story" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-700 shadow-lg">Criar História</button>
            </div>
        </div>
    </div>

    <div id="modal-add-task" class="modal opacity-0 pointer-events-none fixed inset-0 flex items-center justify-center z-50 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-2xl">
            <h4 class="text-xl font-black mb-2 text-slate-800">Adicionar Tarefa</h4>
            <p class="text-xs text-slate-400 mb-6 uppercase font-bold" id="modal-task-subtitle">Para a história: ...</p>
            <input type="hidden" id="target-story-id">
            <div class="space-y-4">
                <input type="text" id="task-title" class="w-full bg-slate-100 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="O que precisa ser feito?">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="task-points" class="w-full bg-slate-100 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="Pontos" value="3">
                    <input type="text" id="task-owner" class="w-full bg-slate-100 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="Responsável">
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeModal('modal-add-task')" class="font-bold text-slate-400 hover:text-slate-600">Cancelar</button>
                <button id="btn-confirm-task" class="bg-green-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-green-700 shadow-lg">Adicionar Tarefa</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, updateDoc, deleteDoc, arrayUnion, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGQZgIkr2T7DJ880Z0R6Nqi_R4O5zabTw",
            authDomain: "base-scrum.firebaseapp.com",
            projectId: "base-scrum",
            storageBucket: "base-scrum.firebasestorage.app",
            messagingSenderId: "862384072053",
            appId: "1:862384072053:web:922d943b7b95b065381f3c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let activeProjectId = null;
        let storiesData = [];
        let unsubscribeStories = null;

        // --- UI UTILS ---
        window.openModal = (id) => document.getElementById(id).classList.remove('opacity-0', 'pointer-events-none');
        window.closeModal = (id) => document.getElementById(id).classList.add('opacity-0', 'pointer-events-none');
        
        window.switchView = (v) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-button').forEach(b => b.classList.remove('active'));
            document.getElementById('view-'+v).classList.add('active');
            document.querySelector(`[data-view="${v}"]`).classList.add('active');
        };

        // --- PROJETOS (CRUD) ---

        // Escutar Projetos
        onSnapshot(query(collection(db, "projects"), orderBy("createdAt", "desc")), (snap) => {
            const projects = snap.docs.map(d => ({id: d.id, ...d.data()}));
            const sel = document.getElementById('project-selector');
            sel.innerHTML = projects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
            
            // Se o projeto ativo sumiu ou não existe, pega o primeiro
            if(projects.length > 0) {
                if(!activeProjectId || !projects.find(p => p.id === activeProjectId)) {
                    activeProjectId = projects[0].id;
                    sel.value = activeProjectId;
                    loadStories();
                } else {
                    sel.value = activeProjectId;
                    // Atualiza o título caso tenha mudado
                    const current = projects.find(p => p.id === activeProjectId);
                    document.getElementById('current-project-title').innerText = current.name;
                }
            } else {
                activeProjectId = null;
                document.getElementById('current-project-title').innerText = "Crie um projeto";
                renderBacklog();
                renderKanban();
            }

            sel.onchange = (e) => { 
                activeProjectId = e.target.value; 
                loadStories(); 
            };
        });

        // Criar Projeto
        document.getElementById('btn-save-project').onclick = async () => {
            const name = document.getElementById('new-project-name').value;
            if(name) {
                await addDoc(collection(db, "projects"), { name, createdAt: new Date() });
                document.getElementById('new-project-name').value = '';
                closeModal('modal-new-project');
            }
        };

        // Editar Projeto
        window.openEditProjectModal = () => {
            if(!activeProjectId) return alert("Selecione um projeto primeiro");
            const sel = document.getElementById('project-selector');
            const currentName = sel.options[sel.selectedIndex].text;
            document.getElementById('edit-project-name').value = currentName;
            openModal('modal-edit-project');
        };

        document.getElementById('btn-update-project').onclick = async () => {
            const newName = document.getElementById('edit-project-name').value;
            if(newName && activeProjectId) {
                const projRef = doc(db, "projects", activeProjectId);
                await updateDoc(projRef, { name: newName });
                closeModal('modal-edit-project');
            }
        };

        // Excluir Projeto
        window.deleteProject = async () => {
            if(!activeProjectId) return;
            if(confirm("Deseja realmente excluir este projeto? Isso não apagará as histórias vinculadas a ele no banco (por segurança), mas ele sumirá da lista.")) {
                await deleteDoc(doc(db, "projects", activeProjectId));
                activeProjectId = null;
            }
        };

        // --- CARREGAR HISTÓRIAS ---
        function loadStories() {
            if(unsubscribeStories) unsubscribeStories();
            if(!activeProjectId) return;

            const q = query(collection(db, "backlog"), where("projectId", "==", activeProjectId));
            unsubscribeStories = onSnapshot(q, (snap) => {
                storiesData = snap.docs.map(d => ({id: d.id, ...d.data()}));
                
                const sel = document.getElementById('project-selector');
                const projName = sel.options[sel.selectedIndex]?.text;
                document.getElementById('current-project-title').innerText = projName || "Projeto";
                
                renderBacklog();
                renderKanban();
                calculateVelocity();
            });
        }

        function calculateVelocity() {
            let total = 0;
            storiesData.forEach(s => {
                (s.tasks || []).forEach(t => total += (parseInt(t.points) || 0));
            });
            document.getElementById('total-points').innerText = total;
        }

        // --- CRIAR HISTÓRIA ---
        document.getElementById('btn-create-story').onclick = async () => {
            const title = document.getElementById('story-title').value;
            const priority = document.getElementById('story-priority').value;
            const desc = document.getElementById('story-desc').value;

            if(title && activeProjectId) {
                await addDoc(collection(db, "backlog"), {
                    projectId: activeProjectId,
                    title: title,
                    priority: priority,
                    description: desc,
                    tasks: []
                });
                closeModal('modal-new-story');
                document.getElementById('story-title').value = '';
                document.getElementById('story-desc').value = '';
            }
        };

        // --- TAREFAS (Tasks) ---
        window.openAddTaskModal = (storyId, storyTitle) => {
            document.getElementById('target-story-id').value = storyId;
            document.getElementById('modal-task-subtitle').innerText = `Para: ${storyTitle}`;
            openModal('modal-add-task');
        };

        document.getElementById('btn-confirm-task').onclick = async () => {
            const storyId = document.getElementById('target-story-id').value;
            const title = document.getElementById('task-title').value;
            const points = document.getElementById('task-points').value;
            const owner = document.getElementById('task-owner').value;

            if(storyId && title) {
                const newTask = {
                    id: Date.now().toString(),
                    title: title,
                    points: parseInt(points) || 0,
                    owner: owner || 'Sem dono',
                    status: 'todo'
                };
                await updateDoc(doc(db, "backlog", storyId), {
                    tasks: arrayUnion(newTask)
                });
                closeModal('modal-add-task');
                document.getElementById('task-title').value = '';
            }
        };

        window.deleteStory = async (id) => {
            if(confirm("Apagar esta história e todas as suas tarefas?")) {
                await deleteDoc(doc(db, "backlog", id));
            }
        };

        // --- RENDERS ---
        function renderBacklog() {
            const container = document.getElementById('backlog-container');
            if(storiesData.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-slate-400 font-medium">Nenhuma história encontrada para este projeto.</div>`;
                return;
            }

            container.innerHTML = storiesData.map(story => {
                const pColor = story.priority === 'P1' ? 'badge-p1' : (story.priority === 'P2' ? 'badge-p2' : 'badge-p3');
                const storyPoints = (story.tasks || []).reduce((acc, t) => acc + (t.points || 0), 0);

                return `
                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden group">
                    <div class="p-6 border-b border-slate-100 flex justify-between items-start bg-slate-50/50">
                        <div class="flex gap-4">
                            <div class="flex flex-col items-center gap-2">
                                <span class="text-[10px] font-black uppercase px-2 py-0.5 rounded ${pColor}">${story.priority}</span>
                                <span class="text-[10px] font-bold text-slate-400">${storyPoints} pts</span>
                            </div>
                            <div>
                                <h4 class="text-lg font-bold text-slate-800 leading-tight mb-1">${story.title}</h4>
                                <p class="text-xs text-slate-500 line-clamp-1">${story.description || 'Sem descrição'}</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="openAddTaskModal('${story.id}', '${story.title}')" class="bg-white border border-slate-200 text-blue-600 hover:bg-blue-50 px-3 py-1.5 rounded-lg text-xs font-bold transition-all">
                                <i class="fas fa-plus mr-1"></i> Add Task
                            </button>
                            <button onclick="deleteStory('${story.id}')" class="text-slate-300 hover:text-red-500 px-2 transition-colors"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <div class="p-4 bg-white space-y-2">
                        ${(story.tasks && story.tasks.length > 0) ? story.tasks.map(t => `
                            <div class="flex items-center justify-between p-3 rounded-xl border border-slate-100 hover:border-blue-200 transition-all bg-slate-50">
                                <div class="flex items-center gap-3">
                                    <div class="w-2 h-2 rounded-full ${t.status === 'done' ? 'bg-green-500' : (t.status === 'doing' ? 'bg-blue-500' : 'bg-slate-300')}"></div>
                                    <span class="text-sm font-semibold text-slate-700">${t.title}</span>
                                </div>
                                <div class="flex items-center gap-3">
                                    <span class="text-[10px] font-bold text-slate-400 uppercase">${t.owner}</span>
                                    <span class="bg-blue-100 text-blue-700 text-[10px] font-bold px-2 py-0.5 rounded">${t.points} pts</span>
                                </div>
                            </div>
                        `).join('') : '<p class="text-center text-xs text-slate-300 italic py-2">Nenhuma tarefa criada ainda.</p>'}
                    </div>
                </div>
            `}).join('');
        }

        function renderKanban() {
            const cols = { todo: document.getElementById('col-todo'), doing: document.getElementById('col-doing'), done: document.getElementById('col-done') };
            Object.values(cols).forEach(c => c.innerHTML = '');
            let counts = { todo: 0, doing: 0, done: 0 };

            storiesData.forEach(story => {
                const pColor = story.priority === 'P1' ? 'text-red-500 bg-red-50 border-red-100' : (story.priority === 'P2' ? 'text-orange-500 bg-orange-50 border-orange-100' : 'text-blue-500 bg-blue-50 border-blue-100');

                (story.tasks || []).forEach((task, index) => {
                    if(cols[task.status]) {
                        counts[task.status]++;
                        const card = document.createElement('div');
                        card.className = "bg-white p-4 rounded-xl shadow-sm border border-slate-200 hover:shadow-md cursor-grab active:cursor-grabbing transition-all relative group";
                        card.draggable = true;
                        card.innerHTML = `
                            <div class="mb-2 flex justify-between items-start">
                                <span class="text-[9px] font-extrabold uppercase px-1.5 py-0.5 rounded border ${pColor}">${story.priority}</span>
                                <span class="bg-slate-100 text-slate-500 text-[9px] font-bold px-1.5 py-0.5 rounded">${task.points} pts</span>
                            </div>
                            <h5 class="text-sm font-bold text-slate-800 mb-3 leading-snug">${task.title}</h5>
                            <div class="flex items-center gap-1.5 pt-2 border-t border-slate-50">
                                <i class="fas fa-tag text-[9px] text-slate-300"></i>
                                <span class="text-[9px] font-bold text-slate-400 truncate max-w-[150px]">${story.title}</span>
                            </div>
                        `;
                        card.ondragstart = (e) => {
                            e.dataTransfer.setData("storyId", story.id);
                            e.dataTransfer.setData("taskIndex", index);
                            card.classList.add('dragging');
                        };
                        card.ondragend = () => card.classList.remove('dragging');
                        cols[task.status].appendChild(card);
                    }
                });
            });
            document.getElementById('count-todo').innerText = counts.todo;
            document.getElementById('count-doing').innerText = counts.doing;
            document.getElementById('count-done').innerText = counts.done;
        }

        // --- DRAG AND DROP ---
        document.querySelectorAll('.kanban-column').forEach(col => {
            col.ondragover = (e) => { e.preventDefault(); col.classList.add('drag-over'); };
            col.ondragleave = () => col.classList.remove('drag-over');
            col.ondrop = async (e) => {
                e.preventDefault();
                col.classList.remove('drag-over');
                const sId = e.dataTransfer.getData("storyId");
                const tIdx = parseInt(e.dataTransfer.getData("taskIndex"));
                const newStatus = col.getAttribute('data-status');

                if(sId && !isNaN(tIdx)) {
                    const story = storiesData.find(s => s.id === sId);
                    if(story && story.tasks[tIdx].status !== newStatus) {
                        const newTasks = [...story.tasks];
                        newTasks[tIdx].status = newStatus;
                        await updateDoc(doc(db, "backlog", sId), { tasks: newTasks });
                    }
                }
            };
        });
    </script>
</body>
</html>
