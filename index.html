<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectPro Ultra - Gestão Completa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .tab-content { display: none; opacity: 0; transform: translateY(10px); transition: all 0.3s ease; }
        .tab-content.active { display: block; opacity: 1; transform: translateY(0); }
        .nav-button.active { background-color: #2563eb; color: white; }
        .modal { transition: opacity 0.25s ease; }
        .kanban-card:hover .action-btns { opacity: 1; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen overflow-hidden">

    <div class="flex h-full">
        <aside class="w-72 bg-white border-r border-slate-200 flex flex-col shrink-0 shadow-sm z-30">
            <div class="p-6 border-b border-slate-100">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fas fa-project-diagram"></i></div>
                    <h1 class="font-black text-lg text-blue-900">ProjectPro</h1>
                </div>
            </div>

            <div class="p-4 bg-slate-50 border-b border-slate-100">
                <label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">Projeto Ativo</label>
                <select id="project-selector" class="w-full bg-white border border-slate-200 rounded-lg px-3 py-2 text-sm font-semibold outline-none"></select>
                <button onclick="openModal('modal-new-project')" class="mt-3 w-full border-2 border-dashed border-slate-300 rounded-lg py-2 text-xs font-bold text-slate-500 hover:text-blue-600">+ Novo Projeto</button>
            </div>

            <nav class="flex-1 p-4 space-y-2">
                <button onclick="switchView('backlog')" class="nav-button w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 active" data-view="backlog">
                    <i class="fas fa-layer-group"></i> <span class="text-sm font-semibold">Backlog</span>
                </button>
                <button onclick="switchView('sprint')" class="nav-button w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600" data-view="sprint">
                    <i class="fas fa-columns"></i> <span class="text-sm font-semibold">Kanban</span>
                </button>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-20 bg-white border-b border-slate-200 px-8 flex items-center justify-between">
                <h2 class="text-xl font-extrabold text-slate-800" id="current-project-title">Carregando...</h2>
            </header>

            <section class="flex-1 p-8 overflow-y-auto bg-slate-50">
                <div id="view-backlog" class="tab-content active space-y-6">
                    <div class="flex justify-between items-center">
                        <h3 class="text-2xl font-black">Histórias e Tarefas</h3>
                        <button onclick="openModal('modal-new-story')" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold">Nova História</button>
                    </div>
                    <div id="backlog-stories-container" class="grid gap-6"></div>
                </div>

                <div id="view-sprint" class="tab-content h-full">
                    <div class="flex gap-6 h-full overflow-x-auto">
                        <div class="min-w-[320px] flex-1">
                            <span class="text-xs font-black text-slate-400 uppercase mb-4 block px-2">Para Fazer</span>
                            <div id="col-todo" class="space-y-3 bg-slate-200/30 p-2 rounded-xl min-h-[500px]"></div>
                        </div>
                        <div class="min-w-[320px] flex-1">
                            <span class="text-xs font-black text-slate-400 uppercase mb-4 block px-2">Em Execução</span>
                            <div id="col-doing" class="space-y-3 bg-blue-100/20 p-2 rounded-xl min-h-[500px]"></div>
                        </div>
                        <div class="min-w-[320px] flex-1">
                            <span class="text-xs font-black text-slate-400 uppercase mb-4 block px-2">Concluído</span>
                            <div id="col-done" class="space-y-3 bg-green-100/20 p-2 rounded-xl min-h-[500px]"></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-new-story" class="modal opacity-0 pointer-events-none fixed inset-0 flex items-center justify-center z-50 bg-slate-900/60">
        <div class="bg-white w-full max-w-lg p-8 rounded-3xl shadow-2xl overflow-y-auto max-h-[90vh]">
            <h4 class="text-2xl font-black mb-6">Cadastrar Tarefa</h4>
            <div class="grid grid-cols-1 gap-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Título da História</label>
                    <input type="text" id="new-story-title" class="w-full bg-slate-100 p-3 rounded-xl outline-none border border-transparent focus:border-blue-500" placeholder="Ex: Sistema de Login">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Nome da Tarefa</label>
                    <input type="text" id="new-task-name" class="w-full bg-slate-100 p-3 rounded-xl outline-none" placeholder="Ex: Criar API de autenticação">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Responsável</label>
                    <input type="text" id="new-task-owner" class="w-full bg-slate-100 p-3 rounded-xl outline-none" placeholder="Nome do responsável">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Data Início</label>
                        <input type="date" id="new-task-start" class="w-full bg-slate-100 p-3 rounded-xl outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Data Término</label>
                        <input type="date" id="new-task-end" class="w-full bg-slate-100 p-3 rounded-xl outline-none">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Descrição da Tarefa</label>
                    <textarea id="new-task-desc" rows="3" class="w-full bg-slate-100 p-3 rounded-xl outline-none" placeholder="Detalhes do que deve ser feito..."></textarea>
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeModal('modal-new-story')" class="font-bold text-slate-400 px-4">Cancelar</button>
                <button id="btn-save-story" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg">Salvar Tarefa</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGQZgIkr2T7DJ880Z0R6Nqi_R4O5zabTw",
            authDomain: "base-scrum.firebaseapp.com",
            projectId: "base-scrum",
            storageBucket: "base-scrum.firebasestorage.app",
            messagingSenderId: "862384072053",
            appId: "1:862384072053:web:922d943b7b95b065381f3c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let activeProjectId = null;
        let backlogData = [];

        window.openModal = (id) => document.getElementById(id).classList.remove('opacity-0', 'pointer-events-none');
        window.closeModal = (id) => document.getElementById(id).classList.add('opacity-0', 'pointer-events-none');
        window.switchView = (v) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-button').forEach(b => b.classList.remove('active'));
            document.getElementById('view-'+v).classList.add('active');
            document.querySelector(`[data-view="${v}"]`).classList.add('active');
        };

        // Carregar Projetos
        onSnapshot(collection(db, "projects"), (snap) => {
            const projects = snap.docs.map(d => ({id: d.id, ...d.data()}));
            const sel = document.getElementById('project-selector');
            sel.innerHTML = projects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
            if(!activeProjectId && projects.length) { activeProjectId = projects[0].id; loadData(); }
            sel.onchange = (e) => { activeProjectId = e.target.value; loadData(); };
        });

        function loadData() {
            const q = query(collection(db, "backlog"), where("projectId", "==", activeProjectId));
            onSnapshot(q, (snap) => {
                backlogData = snap.docs.map(d => ({id: d.id, ...d.data()}));
                document.getElementById('current-project-title').innerText = document.getElementById('project-selector').options[document.getElementById('project-selector').selectedIndex]?.text || "Novo Projeto";
                renderAll();
            });
        }

        // Salvar Nova História com os campos extras
        document.getElementById('btn-save-story').onclick = async () => {
            const storyTitle = document.getElementById('new-story-title').value;
            const taskName = document.getElementById('new-task-name').value;
            const owner = document.getElementById('new-task-owner').value;
            const start = document.getElementById('new-task-start').value;
            const end = document.getElementById('new-task-end').value;
            const desc = document.getElementById('new-task-desc').value;

            if(storyTitle && activeProjectId) {
                await addDoc(collection(db, "backlog"), {
                    projectId: activeProjectId,
                    title: storyTitle,
                    tasks: [{ 
                        title: taskName, 
                        owner: owner, 
                        start: start, 
                        end: end, 
                        description: desc, 
                        status: 'todo' 
                    }]
                });
                closeModal('modal-new-story');
                // Limpar campos
                document.querySelectorAll('#modal-new-story input, #modal-new-story textarea').forEach(i => i.value = "");
            }
        };

        window.deleteStory = async (id) => {
            if(confirm("Deseja apagar esta tarefa?")) await deleteDoc(doc(db, "backlog", id));
        };

        function renderAll() {
            const backlogCont = document.getElementById('backlog-stories-container');
            const cols = { todo: document.getElementById('col-todo'), doing: document.getElementById('col-doing'), done: document.getElementById('col-done') };
            
            backlogCont.innerHTML = "";
            Object.values(cols).forEach(c => c.innerHTML = "");

            backlogData.forEach(s => {
                const task = s.tasks[0]; // Pegamos a primeira tarefa da história

                // HTML do Card (Usado no Backlog e no Kanban)
                const cardHTML = `
                    <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition-all relative group">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[9px] font-black bg-blue-50 text-blue-600 px-2 py-0.5 rounded uppercase">${s.title}</span>
                            <button onclick="deleteStory('${s.id}')" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i class="fas fa-trash text-xs"></i></button>
                        </div>
                        <h4 class="font-bold text-slate-800 text-sm mb-2">${task.title}</h4>
                        <p class="text-xs text-slate-500 mb-4 line-clamp-2">${task.description || 'Sem descrição.'}</p>
                        
                        <div class="flex flex-wrap gap-3 mt-4 pt-4 border-t border-slate-50">
                            <div class="flex items-center gap-1.5">
                                <i class="fas fa-user text-[10px] text-slate-400"></i>
                                <span class="text-[10px] font-bold text-slate-600">${task.owner || 'N/A'}</span>
                            </div>
                            <div class="flex items-center gap-1.5">
                                <i class="fas fa-calendar text-[10px] text-slate-400"></i>
                                <span class="text-[10px] font-bold text-slate-500">${task.start ? formatDate(task.start) : '--'} até ${task.end ? formatDate(task.end) : '--'}</span>
                            </div>
                        </div>
                    </div>
                `;

                // Adicionar no Backlog
                backlogCont.innerHTML += cardHTML;

                // Adicionar no Kanban na coluna correta
                if(cols[task.status]) {
                    const kanbanCard = document.createElement('div');
                    kanbanCard.innerHTML = cardHTML;
                    cols[task.status].appendChild(kanbanCard);
                }
            });
        }

        function formatDate(dateStr) {
            const [y, m, d] = dateStr.split('-');
            return `${d}/${m}`;
        }
    </script>
</body>
</html>
